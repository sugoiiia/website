<style>
  /* index.html is a full-viewport lock — no scroll */
  html, body { height: 100%; overflow: hidden; }

  /* ─── HERO ─── */
  .hero {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; text-align: center; padding: 80px 28px 0;
  }

  .hero-media {
    width: 160px; height: 160px; border-radius: 50%;
    overflow: hidden; margin-bottom: 18px;
    border: 1px solid rgba(255,255,255,.12);
    box-shadow: 0 0 0 6px rgba(200,184,122,.08), 0 18px 40px rgba(0,0,0,.45);
    opacity: 0; transform: translateY(10px);
    animation: fadeUp .6s .3s cubic-bezier(.25,.46,.45,.94) forwards;
  }
  .hero-media img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    filter: contrast(1.02) saturate(0.95);
  }

  /* ─── NAME ROTATOR ─── */
  .name-rotator {
    position: relative; height: 80px; width: 100%; margin-bottom: 14px;
    opacity: 0; transform: translateY(10px);
    animation: fadeUp .6s .6s cubic-bezier(.25,.46,.45,.94) forwards;
  }
  .name-slot {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s ease;
  }
  .name-slot.active { opacity: 1; }
  .slot-latin {
    font-family: var(--display); font-size: clamp(42px, 9vw, 68px);
    font-weight: 800; color: #fff; line-height: 1.05; letter-spacing: -.03em;
  }
  .slot-urdu {
    font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', serif;
    font-size: clamp(36px, 7vw, 58px); color: #fff; line-height: 1.05; direction: rtl;
  }
  .slot-mono {
    font-family: var(--mono); font-size: clamp(28px, 5vw, 44px);
    color: var(--accent); font-weight: 300;
  }

  .hero .role {
    font-size: 13px; color: var(--accent); letter-spacing: .2em; text-transform: uppercase;
    font-weight: 300; margin-bottom: 4px;
    opacity: 0; transform: translateY(8px);
    animation: fadeUp .6s .9s cubic-bezier(.25,.46,.45,.94) forwards;
  }
  .hero .location {
    font-size: 12px; color: var(--text-dim); letter-spacing: .14em; text-transform: uppercase;
    opacity: 0; transform: translateY(8px);
    animation: fadeUp .6s 1.1s cubic-bezier(.25,.46,.45,.94) forwards;
  }
  .hero .bio {
    margin-top: 24px; font-size: 15px; color: var(--text); line-height: 1.9;
    opacity: 0; transform: translateY(14px);
    animation: fadeUp .7s 1.3s cubic-bezier(.25,.46,.45,.94) forwards;
  }

  /* ─── SOCIALS ─── */
  .socials {
    display: flex; flex-wrap: wrap; gap: 8px; padding-top: 4px;
    justify-content: center; margin-top: 24px;
  }
  .socials a {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--text-dim); text-decoration: none; font-size: 12px;
    padding: 7px 13px; border: 1px solid rgba(255,255,255,.06); border-radius: 6px;
    background: rgba(255,255,255,.02); position: relative; overflow: hidden;
    transition: color .3s, border-color .3s;
    opacity: 0; transform: translateY(8px);
    animation: fadeUp .5s cubic-bezier(.25,.46,.45,.94) forwards;
  }
  .socials a:nth-child(1) { animation-delay: 1.5s; }
  .socials a:nth-child(2) { animation-delay: 1.62s; }
  .socials a:nth-child(3) { animation-delay: 1.74s; }
  .socials a:nth-child(4) { animation-delay: 1.86s; }
  .socials a::before {
    content: ''; position: absolute; inset: 0; background: var(--accent-dim);
    transform: translateX(-100%); transition: transform .4s cubic-bezier(.25,.46,.45,.94);
  }
  .socials a:hover::before { transform: translateX(0); }
  .socials a:hover { color: var(--accent); border-color: rgba(200,184,122,.3); }
  .socials a span, .socials a svg { position: relative; z-index: 1; }
  .socials svg { width: 13px; height: 13px; }

  @media (max-width: 480px) {
    nav { gap: 4px; }
    nav a { font-size: 11px; padding: 5px 9px; }
    .hero-media { width: 128px; height: 128px; }
    .name-rotator { height: 65px; }
  }
</style>
</head>

<script>
// ─── NAME ROTATOR ───
(function(){
  var slots = document.querySelectorAll('.name-slot');
  var current = 0;
  setInterval(function(){
    slots[current].classList.remove('active');
    current = (current + 1) % slots.length;
    slots[current].classList.add('active');
  }, 2500);
})();
</script>
