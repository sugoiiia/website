<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aahil Ansari</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #131313;
    --surface2: #1a1a1a;
    --text: #d4d0c8;
    --text-dim: #5a5a5a;
    --accent: #c8b87a;
    --accent-dim: rgba(200,184,122,0.12);
    --accent-glow: rgba(200,184,122,0.25);
    --mono: 'IBM Plex Mono', monospace;
    --display: 'Playfair Display', serif;
    --radius: 8px;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.75;
  }

  /* ─── CANVAS ─── */
  #bg-canvas {
    position: fixed; inset: 0; z-index: 0; opacity: 0.4;
  }

  /* ─── GRAIN ─── */
  body::after {
    content:''; position:fixed; inset:0; z-index:1; pointer-events:none;
    opacity:0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
  }

  /* ─── GLOW ─── */
  .glow {
    position:fixed; width:500px; height:500px; border-radius:50%;
    filter:blur(130px); pointer-events:none; z-index:1; opacity:0.1;
    background: radial-gradient(circle, var(--accent), transparent 70%);
    transition: transform 0.8s cubic-bezier(.25,.46,.45,.94);
  }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
    padding: 20px 28px;
    background: linear-gradient(180deg, rgba(10,10,10,0.95) 60%, transparent);
  }
  nav a {
    color: var(--text-dim); text-decoration: none; font-size: 12px;
    letter-spacing: .08em; text-transform: uppercase;
    padding: 6px 12px; border-radius: 20px; border: 1px solid transparent;
    transition: all 0.3s ease;
  }
  nav a:hover, nav a.active {
    color: var(--accent);
    border-color: var(--accent-dim);
    background: var(--accent-dim);
  }

  /* ─── HERO ─── */
  .hero {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh;
    text-align: center;
    padding: 80px 28px 0;
  }

  .hero-media {
    width: 160px; height: 160px; border-radius: 50%;
    overflow: hidden; margin-bottom: 18px;
    border: 1px solid rgba(255,255,255,.12);
    box-shadow: 0 0 0 6px rgba(200,184,122,.08), 0 18px 40px rgba(0,0,0,.45);
    opacity: 0; transform: translateY(10px);
    animation: fadeUp .6s .3s cubic-bezier(.25,.46,.45,.94) forwards;
  }
  .hero-media img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    filter: contrast(1.02) saturate(0.95);
  }

  /* ─── NAME ROTATOR ─── */
  .name-rotator {
    position: relative;
    height: 80px;
    width: 100%;
    margin-bottom: 14px;
    opacity: 0; transform: translateY(10px);
    animation: fadeUp .6s .6s cubic-bezier(.25,.46,.45,.94) forwards;
  }
  .name-slot {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .name-slot.active { opacity: 1; }

  .slot-latin {
    font-family: var(--display); font-size: clamp(42px, 9vw, 68px);
    font-weight: 800; color: #fff; line-height: 1.05; letter-spacing: -.03em;
  }
  .slot-urdu {
    font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', serif;
    font-size: clamp(36px, 7vw, 58px);
    color: #fff; line-height: 1.05;
    direction: rtl;
  }
  .slot-mono {
    font-family: var(--mono); font-size: clamp(28px, 5vw, 44px);
    color: var(--accent); font-weight: 300;
  }

  .hero .role {
    font-size: 13px; color: var(--accent); letter-spacing: .2em; text-transform: uppercase;
    font-weight: 300; margin-bottom: 4px;
    opacity: 0; transform: translateY(8px);
    animation: fadeUp .6s .9s cubic-bezier(.25,.46,.45,.94) forwards;
  }
  .hero .location {
    font-size: 12px; color: var(--text-dim); letter-spacing: .14em; text-transform: uppercase;
    opacity: 0; transform: translateY(8px);
    animation: fadeUp .6s 1.1s cubic-bezier(.25,.46,.45,.94) forwards;
  }

  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  .hero .bio {
    margin-top: 24px; font-size: 15px; color: var(--text); line-height: 1.9;
    opacity: 0; transform: translateY(14px);
    animation: fadeUp .7s 1.3s cubic-bezier(.25,.46,.45,.94) forwards;
  }

  /* ─── SOCIALS ─── */
  .socials {
    display: flex; flex-wrap: wrap; gap: 8px; padding-top: 4px;
    justify-content: center; margin-top: 24px;
  }
  .socials a {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--text-dim); text-decoration: none; font-size: 12px;
    padding: 7px 13px; border: 1px solid rgba(255,255,255,.06); border-radius: 6px;
    background: rgba(255,255,255,.02); position: relative; overflow: hidden;
    transition: color .3s, border-color .3s;
    opacity: 0; transform: translateY(8px);
    animation: fadeUp .5s cubic-bezier(.25,.46,.45,.94) forwards;
  }
  .socials a:nth-child(1) { animation-delay: 1.5s; }
  .socials a:nth-child(2) { animation-delay: 1.62s; }
  .socials a:nth-child(3) { animation-delay: 1.74s; }
  .socials a:nth-child(4) { animation-delay: 1.86s; }

  .socials a::before {
    content: ''; position: absolute; inset: 0; background: var(--accent-dim);
    transform: translateX(-100%); transition: transform .4s cubic-bezier(.25,.46,.45,.94);
  }
  .socials a:hover::before { transform: translateX(0); }
  .socials a:hover { color: var(--accent); border-color: rgba(200,184,122,.3); }
  .socials a span, .socials a svg { position: relative; z-index: 1; }
  .socials svg { width: 13px; height: 13px; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 480px) {
    nav { gap: 4px; }
    nav a { font-size: 11px; padding: 5px 9px; }
    .hero-media { width: 128px; height: 128px; }
    .name-rotator { height: 65px; }
  }
</style>
</head>
<body>

<div class="glow" id="glow"></div>

<script>
// ─── 1. NAME ROTATOR ───
(function(){
  const slots = document.querySelectorAll('.name-slot');
  let current = 0;
  setInterval(function(){
    slots[current].classList.remove('active');
    current = (current + 1) % slots.length;
    slots[current].classList.add('active');
  }, 2500);
})();

// ─── 2. MOUSE GLOW ───
(function(){
  const g = document.getElementById('glow');
  let mx = innerWidth/2, my = innerHeight/2, cx = mx, cy = my;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  (function loop(){
    cx += (mx - cx) * .06; cy += (my - cy) * .06;
    g.style.transform = `translate(${cx-250}px,${cy-250}px)`;
    requestAnimationFrame(loop);
  })();
})();

// ─── 3. PARTICLE CANVAS ───
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [], mx = -9999, my = -9999;

  function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
  resize();
  window.addEventListener('resize', resize, { passive: true });
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

  class P {
    constructor(){ this.reset(); }
    reset(){
      this.x = Math.random()*W; this.y = Math.random()*H;
      this.vx = (Math.random()-.5)*.38; this.vy = (Math.random()-.5)*.38;
      this.size = Math.random()*1.8+.4; this.alpha = Math.random()*.35+.1;
    }
    update(){
      const dx = mx-this.x, dy = my-this.y;
      const d = Math.sqrt(dx*dx+dy*dy);
      if(d<200&&d>0){ this.vx += (dx/d)*.02; this.vy += (dy/d)*.02; }
      this.vx *= .994; this.vy *= .994;
      this.x += this.vx; this.y += this.vy;
      if(this.x<-20) this.x=W+20; if(this.x>W+20) this.x=-20;
      if(this.y<-20) this.y=H+20; if(this.y>H+20) this.y=-20;
    }
    draw(){
      ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,184,122,${this.alpha})`; ctx.fill();
    }
  }

  const COUNT = Math.min(Math.floor((W*H)/10000), 180);
  for(let i=0; i<COUNT; i++) particles.push(new P());

  function edges(){
    const D = 140;
    for(let i=0; i<particles.length; i++){
      for(let j=i+1; j<particles.length; j++){
        const dx = particles[i].x-particles[j].x, dy = particles[i].y-particles[j].y;
        const d = Math.sqrt(dx*dx+dy*dy);
        if(d<D){
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(200,184,122,${(1-d/D)*.16})`;
          ctx.lineWidth = .7; ctx.stroke();
        }
      }
    }
  }

  function animate(){
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });
    edges();
    requestAnimationFrame(animate);
  }
  animate();
})();
</script>
