<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Photography — Aahil Ansari</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #131313;
    --surface2: #1a1a1a;
    --text: #d4d0c8;
    --text-dim: #5a5a5a;
    --accent: #c8b87a;
    --accent-dim: rgba(200,184,122,0.12);
    --accent-glow: rgba(200,184,122,0.25);
    --mono: 'IBM Plex Mono', monospace;
    --display: 'Playfair Display', serif;
    --radius: 8px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.75;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── CANVAS ─── */
  #bg-canvas {
    position: fixed; inset: 0; z-index: 0; opacity: 0.4;
  }

  /* ─── GRAIN ─── */
  body::after {
    content:''; position:fixed; inset:0; z-index:1; pointer-events:none;
    opacity:0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
  }

  /* ─── GLOW ─── */
  .glow {
    position:fixed; width:500px; height:500px; border-radius:50%;
    filter:blur(130px); pointer-events:none; z-index:1; opacity:0.1;
    background: radial-gradient(circle, var(--accent), transparent 70%);
    transition: transform 0.8s cubic-bezier(.25,.46,.45,.94);
  }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
    padding: 20px 28px;
    background: linear-gradient(180deg, rgba(10,10,10,0.95) 60%, transparent);
  }
  nav a {
    color: var(--text-dim); text-decoration: none; font-size: 12px;
    letter-spacing: .08em; text-transform: uppercase;
    padding: 6px 12px; border-radius: 20px; border: 1px solid transparent;
    transition: all 0.3s ease;
  }
  nav a:hover, nav a.active {
    color: var(--accent);
    border-color: var(--accent-dim);
    background: var(--accent-dim);
  }

  /* ─── LAYOUT ─── */
  .wrapper {
    position: relative; z-index: 2;
    max-width: 1100px; margin: 0 auto; padding: 0 28px;
    padding-top: 96px; padding-bottom: 80px;
  }

  /* ─── PAGE HEADER ─── */
  .section-label {
    font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px;
    opacity: 0; transform: translateY(10px);
    animation: fadeUp .6s .2s cubic-bezier(.25,.46,.45,.94) forwards;
  }
  .section-label::after {
    content:''; flex:1; height:1px;
    background: linear-gradient(90deg, var(--text-dim), transparent);
    opacity: 0.2;
  }
  .section-title {
    font-family: var(--display); font-size: clamp(32px, 6vw, 52px);
    font-weight: 800; color: #fff; line-height: 1.1;
    letter-spacing: -.02em; margin-bottom: 36px;
    opacity: 0; transform: translateY(12px);
    animation: fadeUp .6s .35s cubic-bezier(.25,.46,.45,.94) forwards;
  }

  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  /* ─── MASONRY GRID ─── */
  .masonry {
    columns: 3;
    column-gap: 8px;
    opacity: 0; transform: translateY(14px);
    animation: fadeUp .7s .5s cubic-bezier(.25,.46,.45,.94) forwards;
  }

  .masonry-item {
    break-inside: avoid;
    display: block;
    width: 100%;
    margin-bottom: 8px;
    border-radius: 4px;
    background: var(--surface2);
    cursor: pointer;
    overflow: hidden;
    transition: opacity .25s, transform .25s cubic-bezier(.25,.46,.45,.94);
  }
  .masonry-item:hover {
    opacity: 0.82;
    transform: scale(0.995);
  }

  /* actual images when swapped in */
  .masonry-item img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 4px;
  }

  @media (max-width: 768px) {
    .masonry { columns: 2; }
  }
  @media (max-width: 480px) {
    .masonry { columns: 1; }
    nav { gap: 4px; }
    nav a { font-size: 11px; padding: 5px 9px; }
    .wrapper { padding-top: 80px; padding-left: 18px; padding-right: 18px; }
  }

  /* ─── LIGHTBOX ─── */
  #lightbox {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.92);
    align-items: center; justify-content: center;
  }
  #lightbox.open {
    display: flex;
  }

  #lightbox-img {
    max-height: 90vh;
    max-width: 90vw;
    object-fit: contain;
    border-radius: 3px;
    display: block;
    /* placeholder fill when no src */
    background: var(--surface2);
    min-width: 200px;
    min-height: 140px;
  }

  .lb-btn {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--accent); font-size: 48px; line-height: 1;
    padding: 16px 20px;
    opacity: 0.7; transition: opacity .2s;
    font-family: var(--mono); font-weight: 300;
    user-select: none;
  }
  .lb-btn:hover { opacity: 1; }
  #lb-prev { left: 12px; }
  #lb-next { right: 12px; }

  #lb-close {
    position: absolute;
    top: 16px; right: 20px;
    background: none; border: none; cursor: pointer;
    color: var(--text-dim); font-size: 28px; line-height: 1;
    padding: 8px; opacity: 0.6; transition: opacity .2s, color .2s;
    font-family: var(--mono);
  }
  #lb-close:hover { opacity: 1; color: var(--accent); }

  #lb-content {
    display: flex; flex-direction: column; align-items: center;
    max-width: 90vw;
  }

  #lb-caption {
    margin-top: 14px;
    font-family: var(--mono); font-size: 12px;
    color: var(--text-dim); letter-spacing: .06em;
    text-align: center; min-height: 1em;
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="glow" id="glow"></div>

<!-- ─── NAV ─── -->
<nav>
  <a href="index.html">Home</a>
  <a href="work.html">Work</a>
  <a href="photography.html" class="active">Photography</a>
  <a href="about.html">About</a>
</nav>

<div class="wrapper">

  <!-- ─── PAGE HEADER ─── -->
  <div class="section-label">Photography</div>
  <h1 class="section-title">What I've seen</h1>

  <!--
    ─── HOW TO ADD A PHOTO ────────────────────────────────────────────────────
    Copy one block below, increment data-index, set the correct filename,
    and fill in data-desc="Your caption here" — that text appears in the
    lightbox when the photo is open. Leave data-desc="" to show no caption.
    ──────────────────────────────────────────────────────────────────────────
  -->
  <div class="masonry" id="masonry">

    <!-- data-desc="Add caption here" ↓ -->
    <div class="masonry-item" data-index="0" data-desc="North Shore, Oahu. Taken with an iPhone 16 Pro Max.">
      <img src="Photography/IMG_2035.jpg" alt="" loading="lazy" />
    </div>

    <!-- data-desc="Add caption here" ↓ -->
    <div class="masonry-item" data-index="1" data-desc="North Shore, Oahu. Taken with an iPhone 16 Pro Max.">
      <img src="Photography/IMG_2039.jpg" alt="" loading="lazy" />
    </div>

    <!-- data-desc="Add caption here" ↓ -->
    <div class="masonry-item" data-index="2" data-desc="Resident Seal (Sweetie), North Shore, Oahu. Taken with an iPhone 16 Pro Max.">
      <img src="Photography/IMG_2069.jpg" alt="" loading="lazy" />
    </div>

    <!-- data-desc="Add caption here" ↓ -->
    <div class="masonry-item" data-index="3" data-desc="Makapuʻu Point, Oahu. Taken with an iPhone 16 Pro Max.">
      <img src="Photography/IMG_2206.jpg" alt="" loading="lazy" />
    </div>

    <!-- data-desc="Add caption here" ↓ -->
    <div class="masonry-item" data-index="4" data-desc="Makapuʻu Point Lighthouse, Oahu. Taken with an iPhone 16 Pro Max">
      <img src="Photography/IMG_2225.jpg" alt="" loading="lazy" />
    </div>

  </div>

</div><!-- /wrapper -->

<!-- ─── LIGHTBOX ─── -->
<div id="lightbox">
  <button id="lb-close" aria-label="Close">&#215;</button>
  <button class="lb-btn" id="lb-prev" aria-label="Previous">&#8249;</button>
  <div id="lb-content">
    <img id="lightbox-img" alt="" />
    <p id="lb-caption"></p>
  </div>
  <button class="lb-btn" id="lb-next" aria-label="Next">&#8250;</button>
</div>

<script>
// ─── 1. MOUSE GLOW ───
(function(){
  const g = document.getElementById('glow');
  let mx = innerWidth/2, my = innerHeight/2, cx = mx, cy = my;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  (function loop(){
    cx += (mx - cx) * .06; cy += (my - cy) * .06;
    g.style.transform = `translate(${cx-250}px,${cy-250}px)`;
    requestAnimationFrame(loop);
  })();
})();

// ─── 2. PARTICLE CANVAS ───
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [], mx = -9999, my = -9999;

  function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
  resize();
  window.addEventListener('resize', resize, { passive: true });
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

  class P {
    constructor(){ this.reset(); }
    reset(){
      this.x = Math.random()*W; this.y = Math.random()*H;
      this.vx = (Math.random()-.5)*.38; this.vy = (Math.random()-.5)*.38;
      this.size = Math.random()*1.8+.4; this.alpha = Math.random()*.35+.1;
    }
    update(){
      const dx = mx-this.x, dy = my-this.y;
      const d = Math.sqrt(dx*dx+dy*dy);
      if(d<200&&d>0){ this.vx += (dx/d)*.02; this.vy += (dy/d)*.02; }
      this.vx *= .994; this.vy *= .994;
      this.x += this.vx; this.y += this.vy;
      if(this.x<-20) this.x=W+20; if(this.x>W+20) this.x=-20;
      if(this.y<-20) this.y=H+20; if(this.y>H+20) this.y=-20;
    }
    draw(){
      ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,184,122,${this.alpha})`; ctx.fill();
    }
  }

  const COUNT = Math.min(Math.floor((W*H)/10000), 180);
  for(let i=0; i<COUNT; i++) particles.push(new P());

  function edges(){
    const D = 140;
    for(let i=0; i<particles.length; i++){
      for(let j=i+1; j<particles.length; j++){
        const dx = particles[i].x-particles[j].x, dy = particles[i].y-particles[j].y;
        const d = Math.sqrt(dx*dx+dy*dy);
        if(d<D){
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(200,184,122,${(1-d/D)*.16})`;
          ctx.lineWidth = .7; ctx.stroke();
        }
      }
    }
  }

  function animate(){
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });
    edges();
    requestAnimationFrame(animate);
  }
  animate();
})();

// ─── 3. LIGHTBOX ───
(function(){
  const lightbox  = document.getElementById('lightbox');
  const lbImg     = document.getElementById('lightbox-img');
  const lbPrev    = document.getElementById('lb-prev');
  const lbNext    = document.getElementById('lb-next');
  const lbClose   = document.getElementById('lb-close');

  let items = [];
  let current = 0;

  function getItems(){
    // works for both placeholder divs and real <img> tags
    return Array.from(document.querySelectorAll('#masonry .masonry-item'));
  }

  function open(index){
    items = getItems();
    current = ((index % items.length) + items.length) % items.length;
    show();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function close(){
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  function show(){
    const el = items[current];
    const img = el.tagName === 'IMG' ? el : el.querySelector('img');
    if(img) {
      lbImg.src = img.src;
      lbImg.alt = img.alt || '';
      lbImg.style.background = '';
    } else {
      lbImg.src = '';
      lbImg.alt = '';
      lbImg.style.background = 'var(--surface2)';
    }
    document.getElementById('lb-caption').textContent = el.dataset.desc || '';
  }

  function prev(){
    current = (current - 1 + items.length) % items.length;
    show();
  }

  function next(){
    current = (current + 1) % items.length;
    show();
  }

  // click items to open
  document.getElementById('masonry').addEventListener('click', e => {
    const item = e.target.closest('.masonry-item');
    if(!item) return;
    const index = parseInt(item.dataset.index, 10);
    open(isNaN(index) ? 0 : index);
  });

  lbPrev.addEventListener('click', e => { e.stopPropagation(); prev(); });
  lbNext.addEventListener('click', e => { e.stopPropagation(); next(); });
  lbClose.addEventListener('click', close);

  // click outside image closes
  lightbox.addEventListener('click', e => {
    if(e.target === lightbox) close();
  });

  // keyboard
  document.addEventListener('keydown', e => {
    if(!lightbox.classList.contains('open')) return;
    if(e.key === 'ArrowLeft')  prev();
    if(e.key === 'ArrowRight') next();
    if(e.key === 'Escape')     close();
  });
})();
</script>
</body>
</html>
