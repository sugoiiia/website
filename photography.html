<style>
  .wrapper {
    position: relative; z-index: 2;
    max-width: 1100px; margin: 0 auto; padding: 0 28px;
    padding-top: 96px; padding-bottom: 80px;
  }

  /* ─── PAGE HEADER (animated on load) ─── */
  .section-label {
    opacity: 0; transform: translateY(10px);
    animation: fadeUp .6s .2s cubic-bezier(.25,.46,.45,.94) forwards;
  }
  .section-title {
    font-size: clamp(32px, 6vw, 52px); margin-bottom: 36px;
    opacity: 0; transform: translateY(12px);
    animation: fadeUp .6s .35s cubic-bezier(.25,.46,.45,.94) forwards;
  }

  /* ─── MASONRY GRID ─── */
  .masonry {
    columns: 3; column-gap: 8px;
    opacity: 0; transform: translateY(14px);
    animation: fadeUp .7s .5s cubic-bezier(.25,.46,.45,.94) forwards;
  }
  .masonry-item {
    break-inside: avoid; display: block; width: 100%;
    margin-bottom: 8px; border-radius: 4px;
    background: var(--surface2); cursor: pointer; overflow: hidden;
    transition: opacity .25s, transform .25s cubic-bezier(.25,.46,.45,.94);
  }
  .masonry-item:hover { opacity: 0.82; transform: scale(0.995); }
  .masonry-item img { display: block; width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }

  @media (max-width: 768px) { .masonry { columns: 2; } }
  @media (max-width: 480px) {
    .masonry { columns: 1; }
    nav { gap: 4px; }
    nav a { font-size: 11px; padding: 5px 9px; }
    .wrapper { padding-top: 80px; padding-left: 18px; padding-right: 18px; }
  }

  /* ─── LIGHTBOX ─── */
  #lightbox {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.92); align-items: center; justify-content: center;
  }
  #lightbox.open { display: flex; }

  #lightbox-img {
    max-height: 90vh; max-width: 90vw; object-fit: contain;
    border-radius: 3px; display: block;
    background: var(--surface2); min-width: 200px; min-height: 140px;
  }

  .lb-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--accent); font-size: 48px; line-height: 1;
    padding: 16px 20px; opacity: 0.7; transition: opacity .2s;
    font-family: var(--mono); font-weight: 300; user-select: none;
  }
  .lb-btn:hover { opacity: 1; }
  #lb-prev { left: 12px; }
  #lb-next { right: 12px; }

  #lb-close {
    position: absolute; top: 16px; right: 20px;
    background: none; border: none; cursor: pointer;
    color: var(--text-dim); font-size: 28px; line-height: 1;
    padding: 8px; opacity: 0.6; transition: opacity .2s, color .2s;
    font-family: var(--mono);
  }
  #lb-close:hover { opacity: 1; color: var(--accent); }

  #lb-content {
    display: flex; flex-direction: column; align-items: center; max-width: 90vw;
  }
  #lb-caption {
    margin-top: 14px; font-family: var(--mono); font-size: 12px;
    color: var(--text-dim); letter-spacing: .06em; text-align: center; min-height: 1em;
  }
</style>

<script src="shared.js"></script>
<script>
// ─── LIGHTBOX ───
(function(){
  var lightbox = document.getElementById('lightbox');
  var lbImg    = document.getElementById('lightbox-img');
  var lbPrev   = document.getElementById('lb-prev');
  var lbNext   = document.getElementById('lb-next');
  var lbClose  = document.getElementById('lb-close');
  var items = [], current = 0;

  function getItems(){ return Array.from(document.querySelectorAll('#masonry .masonry-item')); }

  function open(index){
    items = getItems();
    current = ((index % items.length) + items.length) % items.length;
    show();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function close(){
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }
  function show(){
    var el = items[current];
    var img = el.tagName === 'IMG' ? el : el.querySelector('img');
    if(img){ lbImg.src = img.src; lbImg.alt = img.alt || ''; lbImg.style.background = ''; }
    else   { lbImg.src = ''; lbImg.alt = ''; lbImg.style.background = 'var(--surface2)'; }
    document.getElementById('lb-caption').textContent = el.dataset.desc || '';
  }
  function prev(){ current = (current - 1 + items.length) % items.length; show(); }
  function next(){ current = (current + 1) % items.length; show(); }

  document.getElementById('masonry').addEventListener('click', function(e){
    var item = e.target.closest('.masonry-item');
    if(!item) return;
    var index = parseInt(item.dataset.index, 10);
    open(isNaN(index) ? 0 : index);
  });

  lbPrev.addEventListener('click', function(e){ e.stopPropagation(); prev(); });
  lbNext.addEventListener('click', function(e){ e.stopPropagation(); next(); });
  lbClose.addEventListener('click', close);
  lightbox.addEventListener('click', function(e){ if(e.target === lightbox) close(); });
  document.addEventListener('keydown', function(e){
    if(!lightbox.classList.contains('open')) return;
    if(e.key === 'ArrowLeft')  prev();
    if(e.key === 'ArrowRight') next();
    if(e.key === 'Escape')     close();
  });
})();
</script>
